version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: car_rental_postgres
    restart: always
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: postgres
      # DEV-ONLY: Do not use this password in production environment.
      POSTGRES_PASSWORD: postgrespassword123
      POSTGRES_DB: car_rental
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: car_rental_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
